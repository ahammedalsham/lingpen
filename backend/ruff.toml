# ruff.toml — placed in backend/
target-version = "py312"
line-length = 100

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "N",   # pep8-naming
]
ignore = [
    "B008",  # do not perform function calls in default arguments (FastAPI Depends pattern)
    "N818",  # exception name should end in Error (we have some custom exceptions)
]

[lint.per-file-ignores]
"tests/*" = ["S101"]  # allow assert in tests

[format]
quote-style = "double"
indent-style = "space"
